<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirect Tests</title>
  <style>
    .testcase-panel { margin: 1em 0; padding: 1em; border: 1px solid #ccc; }
    .testcase-area { padding: 0.5em; background: #f9f9f9; }
    .testcase-examplecontent { padding: 10px; background: #e0ffe0; }
  </style>
</head>
<body>
  <h1>Redirect Filters</h1>

  <section id="redirect-noop-section" class="testcase-panel">
    <h2>Redirect to noop.js</h2>
    <p>Test that a redirect filter replaces the script with a noop resource.</p>
    <div class="testcase-area">
      <div class="testcase-examplecontent" data-expectedresult="pass">Example Content</div>
    </div>
    <h3>Filter</h3>
    <pre>||127.0.0.1:9876/ads/redirect-target.js$script,redirect=noop.js</pre>
  </section>

  <!-- This script should be redirected to a noop resource -->
  <script src="/ads/redirect-target.js"></script>
</body>
</html>
